<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("optimizers-theme");
          var theme = raw ? JSON.parse(raw).state.theme : "system";
          var isDark = theme === "system" ? window.matchMedia("(prefers-color-scheme: dark)").matches : theme === "dark";
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <style>
      html {
        background: #f4f5f7;
      }
      html.dark {
        background: #0c0e11;
      }
    </style>
    <link rel="icon" type="image/png" href="/Optimizers/favicon.png" />

</html>
